kind = "web"
previewPath = "/"
title = "Polo Clubhouse"
version = "1.0.0"
id = "artifacts/polo-manager"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18759

[services.development]
run = "pnpm --filter @workspace/polo-manager run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/polo-manager", "run", "build" ]
publicDir = "artifacts/polo-manager/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18759"
BASE_PATH = "/"
