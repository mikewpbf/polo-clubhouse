    TeamDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clubId:
          type: string
          format: uuid
        name:
          type: string
        shortName:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        logoThumbUrl:
          type: string
          nullable: true
        primaryColor:
          type: string
          nullable: true
        handicap:
          type: string
          nullable: true
        contactName:
          type: string
          nullable: true
        contactPhone:
          type: string
          nullable: true
        notes:
