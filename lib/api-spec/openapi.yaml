      operationId: resolveShareToken
      tags: [shareLinks]
      summary: Resolve a public share token
      description: Returns matchId and pageType for valid tokens. Returns reason codes (not_found, revoked, expired, match_missing) on failure.
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Resolved share token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ResolveShareTokenResponse"
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareTokenError"
        "410":
          description: Token revoked or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ShareTokenError"

  /matches/{matchId}/player-stats/{playerId}:
    get:
      operationId: getMatchPlayerStats
      tags: [matches]
      summary: Get per-player + per-tournament stats for the Player Stats lower-third graphic
      description: |
        Broadcast surface for the Player Stats lower-third graphic. URL-gated
        only — no auth gate, same posture as the scorebug endpoint.
        Intentionally exposes the public `headshotUrl` for the on-air photo;
        the private `broadcastImageUrl` is never returned here.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: playerId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Player stats payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchPlayerStats"
        "404":
          description: Match or player not found, or player is not on either side's roster for this match.

  /matches/{matchId}/lineup/{teamSide}:
    get:
      operationId: getMatchLineup
      tags: [matches]
      summary: Get the 4-player starting lineup for one side of a match
      description: |
        Broadcast surface for the Team Lineup graphic. Intentionally exposes
        each player's `broadcastImageUrl` so the on-air overlay can render the
        broadcast aux photo. Public/spectator surfaces still strip aux URLs.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: teamSide
          in: path
          required: true
          schema:
            type: string
            enum: [home, away]
      responses:
        "200":
          description: Lineup payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchLineup"
        "400":
          description: Invalid teamSide
        "404":
          description: Match not found

