components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    MessageResponse:
      type: object
      properties:
        message:
          type: string
      required:
        - message

    SignupRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        displayName:
          type: string
      required:
        - email
        - password
        - displayName

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/UserWithRoles"
        token:
          type: string
      required:
        - user
        - token

    UserWithRoles:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        displayName:
          type: string
        phone:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        role:
          type: string
          enum: [spectator, team_manager, admin]
        clubMemberships:
          type: array
          items:
            $ref: "#/components/schemas/ClubMembershipBrief"
        teamAssignments:
          type: array
          items:
            $ref: "#/components/schemas/TeamAssignmentBrief"
      required:
        - id
        - email
        - displayName
        - role
        - clubMemberships
        - teamAssignments

    ClubMembershipBrief:
      type: object
      properties:
        clubId:
          type: string
          format: uuid
        clubName:
          type: string
        clubSlug:
          type: string
        role:
          type: string
          enum: [owner, manager]
      required:
        - clubId
        - clubName
        - clubSlug
        - role

    TeamAssignmentBrief:
      type: object
      properties:
        assignmentId:
          type: string
          format: uuid
        teamId:
          type: string
          format: uuid
        teamName:
          type: string
        tournamentId:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
      required:
        - assignmentId
        - teamId
        - teamName
        - status

    Club:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
        logo96Url:
          type: string
          nullable: true
        logo40Url:
          type: string
          nullable: true
        logoInitials:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - slug

    ClubDetail:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        logoUrl:
          type: string
          nullable: true
        logo96Url:
          type: string
          nullable: true
        logo40Url:
          type: string
          nullable: true
        logoInitials:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        website:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        fields:
          type: array
          items:
            $ref: "#/components/schemas/Field"
        tournaments:
          type: array
          items:
            $ref: "#/components/schemas/Tournament"
        followerCount:
          type: integer
        isFollowing:
          type: boolean
      required:
        - id
        - name
        - slug
        - fields
        - tournaments
        - followerCount
        - isFollowing

    CreateClubRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        website:
          type: string
        country:
          type: string
        region:
          type: string
      required:
        - name
        - slug

    UpdateClubRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        website:
          type: string
        country:
          type: string
        region:
          type: string
        logoUrl:
          type: string
        logo96Url:
          type: string
        logo40Url:
          type: string

    Field:
