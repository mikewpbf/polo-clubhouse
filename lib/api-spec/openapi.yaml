        - name

    CreateTeamRequest:
      type: object
      properties:
        name:
          type: string
        shortName:
          type: string
        primaryColor:
          type: string
        handicap:
          type: string
        contactName:
          type: string
        contactPhone:
          type: string
        notes:
          type: string
        logoUrl:
          type: string
      required:
        - name

    UpdateTeamRequest:
      type: object
      properties:
        name:
          type: string
        shortName:
          type: string
        primaryColor:
          type: string
        handicap:
          type: string
        contactName:
          type: string
        contactPhone:
          type: string
        notes:
          type: string
        logoUrl:
          type: string

    Tournament:
      type: object
      properties:
        id:
          type: string
          format: uuid
        clubId:
          type: string
          format: uuid
        name:
          type: string
        format:
          type: string
          nullable: true
          enum: [round_robin, single_elim, double_elim, group_knockout, swiss]
        handicapLevel:
          type: string
          nullable: true
        startDate:
          type: string
          nullable: true
        endDate:
          type: string
          nullable: true
        finalsDate:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, published, in_progress, completed, archived]
        matchDurationMin:
          type: integer
        gapBetweenMin:
          type: integer
        chukkersPerMatch:
          type: integer
        chukkerDurationMinutes:
          type: integer
        hasThirdPlace:
          type: boolean
        isVisitingLeague:
          type: boolean
        scheduleConfig:
          type: object
          nullable: true
        aiRecommendation:
          type: object
          nullable: true
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - clubId
        - name
