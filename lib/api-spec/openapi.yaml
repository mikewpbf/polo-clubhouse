    SyncMatchAnchorRequest:
      type: object
      properties:
        mode:
          type: string
          enum: [event, nudge, restore]
          description: |
            "event" back-calculates the anchor from a chosen event + the video position;
            "nudge" shifts the existing anchor by N seconds;
            "restore" sets the anchor to a specific ISO datetime or null (Undo).
        eventId:
          type: string
          format: uuid
          description: Required when mode=event. Must belong to this match.
        videoSeconds:
          type: number
          description: Required when mode=event. Current YouTube player position when the admin clicked the chip.
        shiftSeconds:
          type: number
          description: Required when mode=nudge. Positive = events appear earlier in the video, negative = later.
        restoreToIso:
          type: string
          nullable: true
          description: Required when mode=restore. ISO datetime to restore the anchor to, or null to clear it.
      required:
        - mode

