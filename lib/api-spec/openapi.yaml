openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Polo Manager API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: clubs
    description: Club management
  - name: fields
    description: Field management
  - name: teams
    description: Team management
  - name: tournaments
    description: Tournament management
  - name: matches
    description: Match management
  - name: matchEvents
    description: Match event tracking
  - name: teamOutDates
    description: Team out dates
  - name: playDates
    description: Play dates
  - name: tournamentTeams
    description: Tournament team entries
  - name: admin
    description: Admin operations
  - name: teamManager
    description: Team manager portal
  - name: spectator
    description: Spectator operations
  - name: ai
    description: AI advisor
  - name: widget
    description: Embeddable widget
  - name: players
    description: Player profiles and management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Log in
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Log out
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserWithRoles"

  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      summary: List all clubs
      parameters:
        - name: search
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: region
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club"
    post:
      operationId: createClub
      tags: [clubs]
      summary: Create a club
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateClubRequest"
      responses:
        "201":
          description: Club created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"

  /clubs/{slug}:
    get:
      operationId: getClubBySlug
      tags: [clubs]
      summary: Get club by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Club details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubDetail"

  /clubs/{clubId}/update:
    put:
      operationId: updateClub
      tags: [clubs]
      summary: Update club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClubRequest"
      responses:
        "200":
          description: Club updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club"

  /clubs/{clubId}/follow:
    post:
      operationId: followClub
      tags: [spectator]
      summary: Follow a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Followed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /clubs/{clubId}/unfollow:
    post:
      operationId: unfollowClub
      tags: [spectator]
      summary: Unfollow a club
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Unfollowed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /clubs/{clubId}/fields:
    get:
      operationId: listFields
      tags: [fields]
      summary: List club fields
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Fields list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Field"
    post:
      operationId: createField
      tags: [fields]
      summary: Create a field
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFieldRequest"
      responses:
        "201":
          description: Field created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"

  /fields/{fieldId}:
    put:
      operationId: updateField
      tags: [fields]
      summary: Update a field
      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFieldRequest"
      responses:
        "200":
          description: Field updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Field"
    delete:
      operationId: deleteField
      tags: [fields]
      summary: Delete a field
      parameters:
        - name: fieldId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Field deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /clubs/{clubId}/teams:
    get:
      operationId: listTeams
      tags: [teams]
      summary: List club teams
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Teams list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Team"
    post:
      operationId: createTeam
      tags: [teams]
      summary: Create a team
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamRequest"
      responses:
        "201":
          description: Team created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /teams/{teamId}:
    get:
      operationId: getTeam
      tags: [teams]
      summary: Get team details
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamDetail"
    put:
      operationId: updateTeam
      tags: [teams]
      summary: Update a team
      parameters:
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTeamRequest"
      responses:
        "200":
          description: Team updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Team"

  /clubs/{clubId}/tournaments:
    get:
      operationId: listTournaments
      tags: [tournaments]
      summary: List tournaments
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Tournaments list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Tournament"
    post:
      operationId: createTournament
      tags: [tournaments]
      summary: Create a tournament
      parameters:
        - name: clubId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTournamentRequest"
      responses:
        "201":
          description: Tournament created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments:
    get:
      operationId: listAllTournaments
      tags: [tournaments]
      summary: List all public tournaments
      parameters:
        - name: status
          in: query
          schema:
            type: string
        - name: clubSlug
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: All tournaments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TournamentWithClub"

  /tournaments/{tournamentId}:
    get:
      operationId: getTournament
      tags: [tournaments]
      summary: Get tournament details
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tournament details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentDetail"
    put:
      operationId: updateTournament
      tags: [tournaments]
      summary: Update a tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTournamentRequest"
      responses:
        "200":
          description: Tournament updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tournament"

  /tournaments/{tournamentId}/teams:
    get:
      operationId: listTournamentTeams
      tags: [tournamentTeams]
      summary: List tournament teams
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Tournament teams
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TournamentTeamWithDetails"
    post:
      operationId: addTournamentTeam
      tags: [tournamentTeams]
      summary: Add team to tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddTournamentTeamRequest"
      responses:
        "201":
          description: Team added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentTeamWithDetails"

  /tournaments/{tournamentId}/teams/{teamId}:
    put:
      operationId: updateTournamentTeam
      tags: [tournamentTeams]
      summary: Update tournament team entry
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTournamentTeamRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TournamentTeamWithDetails"
    delete:
      operationId: removeTournamentTeam
      tags: [tournamentTeams]
      summary: Remove team from tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tournaments/{tournamentId}/out-dates:
    get:
      operationId: listTournamentOutDates
      tags: [teamOutDates]
      summary: List all out dates for tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Out dates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamOutDate"

  /tournaments/{tournamentId}/teams/{teamId}/out-dates:
    get:
      operationId: listTeamOutDates
      tags: [teamOutDates]
      summary: List out dates for team in tournament
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Team out dates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TeamOutDate"
    post:
      operationId: createTeamOutDate
      tags: [teamOutDates]
      summary: Create team out date
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: teamId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTeamOutDateRequest"
      responses:
        "201":
          description: Out date created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TeamOutDate"

  /out-dates/{outDateId}:
    delete:
      operationId: deleteTeamOutDate
      tags: [teamOutDates]
      summary: Delete out date
      parameters:
        - name: outDateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tournaments/{tournamentId}/play-dates:
    get:
      operationId: listPlayDates
      tags: [playDates]
      summary: List play dates
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Play dates
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PlayDate"
    post:
      operationId: createPlayDate
      tags: [playDates]
      summary: Create play date
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePlayDateRequest"
      responses:
        "201":
          description: Play date created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayDate"

  /play-dates/{playDateId}:
    put:
      operationId: updatePlayDate
      tags: [playDates]
      summary: Update play date
      parameters:
        - name: playDateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdatePlayDateRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayDate"
    delete:
      operationId: deletePlayDate
      tags: [playDates]
      summary: Delete play date
      parameters:
        - name: playDateId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"

  /tournaments/{tournamentId}/matches:
    get:
      operationId: listMatches
      tags: [matches]
      summary: List tournament matches
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: date
          in: query
          schema:
            type: string
        - name: fieldId
          in: query
          schema:
            type: string
        - name: teamId
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Matches list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchWithTeams"

  /tournaments/{tournamentId}/generate-schedule:
    post:
      operationId: generateSchedule
      tags: [tournaments]
      summary: Generate tournament schedule
      parameters:
        - name: tournamentId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Schedule generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenerateScheduleResponse"

  /matches/{matchId}:
    get:
      operationId: getMatch
      tags: [matches]
      summary: Get match details
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Match details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchDetail"
    put:
      operationId: updateMatch
      tags: [matches]
      summary: Update match
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMatchRequest"
      responses:
        "200":
          description: Match updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithTeams"

  /matches/{matchId}/score:
    post:
      operationId: updateMatchScore
      tags: [matches]
      summary: Update match score
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateScoreRequest"
      responses:
        "200":
          description: Score updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithTeams"

  /matches/{matchId}/clock:
    post:
      operationId: updateMatchClock
      tags: [matches]
      summary: Control match clock
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateClockRequest"
      responses:
        "200":
          description: Clock updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithTeams"

  /matches/{matchId}/status:
    post:
      operationId: updateMatchStatus
      tags: [matches]
      summary: Update match status
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateMatchStatusRequest"
      responses:
        "200":
          description: Status updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithTeams"

  /matches/{matchId}/chukker:
    post:
      operationId: advanceChukker
      tags: [matches]
      summary: Advance to next chukker
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Chukker advanced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchWithTeams"

  /matches/{matchId}/sync-anchor:
    post:
      operationId: syncMatchAnchor
      tags: [matches]
      summary: Realign the YouTube stream anchor for this match (admin only)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncMatchAnchorRequest"
      responses:
        "200":
          description: Anchor updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncMatchAnchorResponse"

  /matches/{matchId}/events:
    get:
      operationId: listMatchEvents
      tags: [matchEvents]
      summary: List match events
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Match events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchEvent"

  /matches/{matchId}/share-links:
    get:
      operationId: listMatchShareLinks
      tags: [shareLinks]
      summary: List share links for a match (admin only)
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Share links
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MatchShareLink"
    post:
      operationId: createMatchShareLink
      tags: [shareLinks]
      summary: Create (or regenerate) a share link
      description: Auto-revokes the previous active link of the same page type before issuing a new one.
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShareLinkRequest"
      responses:
        "201":
          description: Newly created share link
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MatchShareLink"

  /matches/{matchId}/share-links/{linkId}:
    delete:
      operationId: revokeMatchShareLink
      tags: [shareLinks]
      summary: Revoke a share link
      parameters:
        - name: matchId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: linkId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Revoked
          content:
            application/json:
              schema:
                type: object
